services:
  api:
    build: ./services/api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/tuneflow.db
      PIPED_BASE_URL: ${PIPED_BASE_URL:-https://pipedapi.kavin.rocks}
    volumes:
      - tuneflow-data:/app/data
    restart: unless-stopped

  piped-backend:
    image: 1337kavin/piped-backend:latest
    profiles: ["piped"]
    environment:
      PORT: 8080
      PROXY_PART: ""
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  tuneflow-data:
