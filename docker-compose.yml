# Optional shared reverse-proxy network: set DOCKER_SHARED_NETWORK in .env and use compose.ps1 / compose.sh.

services:
  tuneflow-api:
    container_name: tuneflow-api
    build:
      context: ./services/api
      args:
        PUID: ${PUID:-10001}
        PGID: ${PGID:-10001}
    user: "${PUID:-10001}:${PGID:-10001}"
    ports:
      - "${API_PORT:-8010}:8000"
    env_file:
      - .env
    environment:
      TUNEFLOW_DATA_DIR: /app/data
      PIPED_BASE_URL: ${PIPED_BASE_URL:-https://api.piped.private.coffee}
      PIPED_FALLBACK_URLS: ${PIPED_FALLBACK_URLS:-https://api.piped.private.coffee,https://pipedapi-libre.kavin.rocks,https://pipedapi.kavin.rocks}
    volumes:
      - ${TUNEFLOW_DATA_HOST_PATH:-tuneflow-data}:/app/data
    restart: unless-stopped

  tuneflow-web:
    container_name: tuneflow-web
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8010}
    ports:
      - "${WEB_PORT:-3010}:80"
    depends_on:
      - tuneflow-api
    restart: unless-stopped

  tuneflow-piped:
    container_name: tuneflow-piped
    image: 1337kavin/piped-backend:latest
    profiles: ["piped"]
    environment:
      PORT: 8080
      PROXY_PART: ""
    ports:
      - "${PIPED_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  tuneflow-data:
